<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reorder PDF Pages (Client-side)</title>
<link rel="icon" href="/favicon.svg" />
<style>
  :root{--bg:#0b0f14;--panel:#121821;--muted:#1b2230;--text:#e8eef6;--sub:#aab7c7;--accent:#6aa0ff}
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#0b0f14,#0e1420);color:var(--text);font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Arial}
  header{padding:14px 16px;border-bottom:1px solid #1a2230;background:#0f1622}
  header h1{margin:0;font-size:18px}
  .wrap{max-width:1100px;margin:0 auto;padding:16px}
  .panel{background:#121821;border:1px solid #1a2230;border-radius:14px;padding:16px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .btn{appearance:none;border:1px solid #2a364a;background:#162233;color:#e8eef6;padding:9px 12px;border-radius:10px;cursor:pointer}
  .btn.primary{background:var(--accent);border-color:#508cff;color:#08111f;font-weight:600}
  .btn[disabled]{opacity:.55;cursor:not-allowed}
  input[type=file]{display:none}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .card{background:#0f1622;border:1px solid #1b2535;border-radius:10px;padding:8px;cursor:move}
  .thumb{width:100%;height:200px;background:#0c1220;border:1px solid #1b2535;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  canvas{max-width:100%;max-height:100%}
  .small{color:#aab7c7;font-size:12px;margin-top:6px;text-align:center}
  .drag-over{outline:2px dashed var(--accent)}
  .muted{color:#aab7c7}
</style>
</head>
<body>
<header><h1>🔀 Reorder PDF Pages (Client-side)</h1></header>

<div class="wrap">
  <div class="panel">
    <div class="row" style="justify-content:space-between">
      <div class="row">
        <label class="btn primary" for="file">Choose PDF</label>
        <input id="file" type="file" accept="application/pdf">
        <span id="meta" class="muted">No file</span>
      </div>
      <div class="row">
        <button class="btn primary" id="btnExport" disabled>Download New PDF</button>
      </div>
    </div>

    <div id="status" class="muted" style="margin:6px 0 12px">Idle…</div>
    <div id="pages" class="grid"></div>
  </div>
  <p class="muted" style="margin-top:10px">
    Privacy: All processing happens locally in your browser using <a href="https://mozilla.github.io/pdf.js/" target="_blank">PDF.js</a> (for preview) and
    <a href="https://pdf-lib.js.org/" target="_blank">pdf-lib</a> (for writing). No uploads.
  </p>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";</script>
<!-- pdf-lib -->
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script>
const $=s=>document.querySelector(s);
const fileEl=$('#file'), pagesEl=$('#pages'), metaEl=$('#meta'), statusEl=$('#status'), btnExport=$('#btnExport');

let arrayBuffer=null, pageCount=0;

function setStatus(t){ statusEl.textContent=t; }
function updateMeta(){ metaEl.textContent=arrayBuffer ? `${pageCount} pages (drag to reorder)` : 'No file'; }

// render thumbnails
async function renderPages(){
  pagesEl.innerHTML='';
  const pdf=await pdfjsLib.getDocument({data: arrayBuffer}).promise;
  pageCount=pdf.numPages; updateMeta();

  for(let i=1;i<=pageCount;i++){
    const page=await pdf.getPage(i);
    const viewport=page.getViewport({scale:0.25});
    const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
    canvas.width=viewport.width; canvas.height=viewport.height;
    await page.render({canvasContext:ctx, viewport}).promise;

    const card=document.createElement('div');
    card.className='card';
    card.draggable=true;
    card.dataset.page=i-1; // zero-based index
    const thumb=document.createElement('div'); thumb.className='thumb'; thumb.appendChild(canvas);
    const small=document.createElement('div'); small.className='small'; small.textContent=`Page ${i}`;
    card.append(thumb,small);

    // drag & drop handlers
    card.addEventListener('dragstart', e=>{
      e.dataTransfer.setData('text/plain', card.dataset.page);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', ()=>card.classList.remove('dragging'));
    card.addEventListener('dragover', e=>{ e.preventDefault(); card.classList.add('drag-over'); });
    card.addEventListener('dragleave', ()=>card.classList.remove('drag-over'));
    card.addEventListener('drop', e=>{
      e.preventDefault();
      card.classList.remove('drag-over');
      const from = document.querySelector('.dragging');
      if(from && from!==card){
        if([...pagesEl.children].indexOf(from) < [...pagesEl.children].indexOf(card)){
          card.after(from);
        }else{
          card.before(from);
        }
      }
    });

    pagesEl.appendChild(card);
  }
  setStatus('Ready. Drag pages to reorder, then click “Download New PDF”.');
  btnExport.disabled=false;
}

// download helper
function downloadBlob(blob, filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=filename; a.style.display='none';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 1500);
}

// events
fileEl.addEventListener('change', async e=>{
  const f=e.target.files?.[0]; if(!f) return;
  metaEl.textContent = `${f.name} — loading…`;
  arrayBuffer=await f.arrayBuffer();
  await renderPages();
});

btnExport.addEventListener('click', async ()=>{
  if(!arrayBuffer) return alert('Choose a PDF first.');
  setStatus('Building new PDF…');

  try{
    const src = await PDFLib.PDFDocument.load(arrayBuffer);
    const out = await PDFLib.PDFDocument.create();

    // get order from DOM
    const order=[...pagesEl.children].map(c=>parseInt(c.dataset.page));
    const copied = await out.copyPages(src, order);
    copied.forEach(p=>out.addPage(p));

    const bytes = await out.save();
    const blob = new Blob([bytes], {type:'application/pdf'});
    downloadBlob(blob,'pdf-reordered.pdf');
    setStatus('Done. Downloaded.');
  }catch(err){
    console.error(err);
    alert('Error: '+(err.message||err));
    setStatus('Error.');
  }
});
</script>
</body>
</html>
