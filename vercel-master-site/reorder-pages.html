<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reorder PDF Pages (Client-side)</title>
<link rel="icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header><h1>🔀 Reorder PDF Pages (Client-side)</h1></header>

<div class="wrap">
  <div class="panel">
    <div class="row" style="justify-content:space-between">
      <div class="row">
        <label class="btn primary" for="file">Choose PDF</label>
        <input id="file" type="file" accept="application/pdf">
        <span id="meta" class="muted">No file</span>
      </div>
      <div class="row">
        <button class="btn" id="btnReset" disabled>Reset order</button>
        <button class="btn primary" id="btnExport" disabled>Download New PDF</button>
      </div>
    </div>

    <div id="status" class="muted" style="margin:6px 0 12px">Idle…</div>
    <div id="pages" class="grid"></div>
  </div>
  <p class="muted" style="margin-top:10px">
    All processing happens locally with <a href="https://mozilla.github.io/pdf.js/" target="_blank" rel="noopener">PDF.js</a> (preview)
    and <a href="https://pdf-lib.js.org/" target="_blank" rel="noopener">pdf-lib</a> (write).
  </p>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";</script>
<!-- pdf-lib -->
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script>
const $=s=>document.querySelector(s);
const fileEl=$('#file'), pagesEl=$('#pages'), metaEl=$('#meta'), statusEl=$('#status'),
      btnExport=$('#btnExport'), btnReset=$('#btnReset');

let fileBytes=null; // Uint8Array
let pageCount=0, originalOrder=[];

function setStatus(t){ statusEl.textContent=t; }
function updateMeta(){ metaEl.textContent=fileBytes ? `${pageCount} pages (drag to reorder)` : 'No file'; }
function downloadBlob(blob, filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=filename; a.style.display='none';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 1500);
}

function updateResetButtonState(){
  const current=[...pagesEl.children].map(c=>parseInt(c.dataset.page,10));
  const same = current.length===originalOrder.length && current.every((v,i)=>v===originalOrder[i]);
  btnReset.disabled = same;
}

function makeCard(i, canvas){
  const card=document.createElement('div');
  card.className='card';
  card.draggable=true;
  card.dataset.page=i; // zero-based source index

  const thumb=document.createElement('div'); thumb.className='thumb'; thumb.appendChild(canvas);
  const small=document.createElement('div'); small.className='small'; small.textContent=`Page ${i+1}`;
  card.append(thumb,small);

  card.addEventListener('dragstart', e=>{
    e.dataTransfer.setData('text/plain', i.toString());
    card.classList.add('dragging');
  });
  card.addEventListener('dragend', ()=>card.classList.remove('dragging'));
  card.addEventListener('dragover', e=>{ e.preventDefault(); card.classList.add('drag-over'); });
  card.addEventListener('dragleave', ()=>card.classList.remove('drag-over'));
  card.addEventListener('drop', e=>{
    e.preventDefault();
    card.classList.remove('drag-over');
    const dragging = document.querySelector('.dragging');
    if(dragging && dragging!==card){
      const kids=[...pagesEl.children];
      const from=kids.indexOf(dragging), to=kids.indexOf(card);
      if(from < to) card.after(dragging); else card.before(dragging);
      updateResetButtonState();
    }
  });

  return card;
}

async function renderPages(){
  pagesEl.innerHTML='';
  const pdf=await pdfjsLib.getDocument({data: new Uint8Array(fileBytes)}).promise;
  pageCount=pdf.numPages; updateMeta();

  originalOrder = Array.from({length:pageCount}, (_,i)=>i);

  for(let i=1;i<=pageCount;i++){
    const page=await pdf.getPage(i);
    const viewport=page.getViewport({scale:0.25});
    const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
    canvas.width=viewport.width; canvas.height=viewport.height;
    await page.render({canvasContext:ctx, viewport}).promise;
    pagesEl.appendChild(makeCard(i-1, canvas));
  }

  btnExport.disabled=false;
  btnReset.disabled=true;
  setStatus('Ready. Drag pages to reorder, then “Download New PDF”.');
}

// Load file
fileEl.addEventListener('change', async e=>{
  const f=e.target.files?.[0]; if(!f) return;
  setStatus(`${f.name} — loading…`);
  fileBytes = new Uint8Array(await f.arrayBuffer());
  await renderPages();
});

// Reset to original
btnReset.addEventListener('click', async ()=>{
  // Quick way: re-render from original order again
  await renderPages();
});

// Export
btnExport.addEventListener('click', async ()=>{
  if(!fileBytes) return alert('Choose a PDF first.');
  setStatus('Building new PDF…'); btnExport.disabled=true;
  try{
    const src = await PDFLib.PDFDocument.load(new Uint8Array(fileBytes));
    const out = await PDFLib.PDFDocument.create();

    const order=[...pagesEl.children].map(c=>parseInt(c.dataset.page,10)); // source indices
    const copied = await out.copyPages(src, order);
    copied.forEach(p=>out.addPage(p));

    const bytes = await out.save({ useObjectStreams:false });
    downloadBlob(new Blob([bytes],{type:'application/pdf'}),'pdf-reordered.pdf');
    setStatus('Done. Downloaded.');
  }catch(err){
    console.error(err); setStatus('Error.');
    alert('Error: '+(err?.message||err));
  }finally{
    btnExport.disabled=false;
  }
});
</script>
</body>
</html>
