<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PNG → JPG Converter (Client-side)</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root{--bg:#0b0f14;--panel:#121821;--muted:#1b2230;--text:#e8eef6;--sub:#aab7c7;--accent:#6aa0ff}
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#0b0f14,#0e1420);color:var(--text);font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial}
  header{padding:14px 16px;border-bottom:1px solid #1a2230;background:#0f1622}
  header h1{margin:0;font-size:18px}
  .wrap{max-width:900px;margin:0 auto;padding:16px}
  .panel{background:#121821;border:1px solid #1a2230;border-radius:14px;padding:16px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn{appearance:none;border:1px solid #2a364a;background:#162233;color:var(--text);padding:9px 12px;border-radius:10px;cursor:pointer}
  .btn.primary{background:var(--accent);border-color:#508cff;color:#08111f;font-weight:600}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  input[type=file]{display:none}
  select,input{padding:8px 10px;border-radius:10px;border:1px solid #2a364a;background:#0f1622;color:#e8eef6}
  .drop{border:2px dashed #2a364a;border-radius:12px;padding:18px;text-align:center;background:#0f1622}
  .drop.drag{border-color:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:14px}
  .thumb{background:#0f1622;border:1px solid #1b2535;border-radius:10px;padding:8px;text-align:center}
  .thumb img{max-width:100%;height:120px;object-fit:contain;display:block;margin:auto}
  .small{color:#aab7c7}
</style>
</head>
<body>
<header><h1>🖼 PNG → JPG (Client-side)</h1></header>
<div class="wrap">
  <div class="panel">
    <div class="row" style="justify-content:space-between">
      <div class="row">
        <label class="btn primary" for="file">Add PNGs</label>
        <input id="file" type="file" accept="image/png" multiple>
        <div class="small" id="meta">No files</div>
      </div>
      <div class="row">
        <label>JPG quality <input id="q" type="number" min="0.5" max="1" step="0.01" value="0.92"></label>
        <label>Background <input id="bg" type="color" value="#ffffff" title="Used for transparent areas"></label>
        <button id="exportBtn" class="btn">Download ZIP</button>
      </div>
    </div>
    <div id="drop" class="drop" tabindex="0">Drag & drop PNG images here. Everything runs in your browser.</div>
    <div id="thumbs" class="grid"></div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const fileEl=$('#file'), drop=$('#drop'), thumbs=$('#thumbs'), meta=$('#meta'), qEl=$('#q'), bgEl=$('#bg'), exportBtn=$('#exportBtn');
let files=[];

function update(){ meta.textContent = files.length? files.length+' files' : 'No files'; thumbs.innerHTML=''; files.forEach((f,i)=>{ const card=document.createElement('div'); card.className='thumb'; const img=document.createElement('img'); img.src=URL.createObjectURL(f); img.onload=()=>URL.revokeObjectURL(img.src); const cap=document.createElement('div'); cap.className='small'; cap.textContent=f.name; card.append(img,cap); thumbs.appendChild(card); }); }

async function add(list){ for(const f of list) if(/^image\/png$/i.test(f.type)) files.push(f); update(); }
fileEl.addEventListener('change', e=> add(e.target.files));
['dragenter','dragover'].forEach(ev=> drop.addEventListener(ev, e=> {e.preventDefault(); drop.classList.add('drag');}));
['dragleave','drop'].forEach(ev=> drop.addEventListener(ev, e=> {e.preventDefault(); drop.classList.remove('drag');}));
drop.addEventListener('drop', e=> add(e.dataTransfer.files));

function hexToRGBA(hex){ const m=hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i); if(!m) return [255,255,255,255]; return [parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16),255]; }
async function convertToJPG(file){ const bitmap=await createImageBitmap(file); const c=document.createElement('canvas'); c.width=bitmap.width; c.height=bitmap.height; const ctx=c.getContext('2d'); const [r,g,b,a]=hexToRGBA(bgEl.value||'#ffffff'); ctx.fillStyle=`rgba(${r},${g},${b},${a/255})`; ctx.fillRect(0,0,c.width,c.height); ctx.drawImage(bitmap,0,0); const q=Math.max(0.5,Math.min(1,parseFloat(qEl.value)||0.92)); const blob=await new Promise(res=>c.toBlob(res,'image/jpeg',q)); return blob; }

async function downloadZip(){ if(!files.length) return alert('Add at least one PNG'); const { default: JSZip } = await import('https://cdn.skypack.dev/jszip@3.10.1'); const zip=new JSZip(); for(const f of files){ const jpgBlob=await convertToJPG(f); const arr=new Uint8Array(await jpgBlob.arrayBuffer()); const name=f.name.replace(/\.png$/i,'')+'.jpg'; zip.file(name,arr); } const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='png-to-jpg.zip'; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1500); }
exportBtn.addEventListener('click', downloadZip);
</script>
</body>
</html>
