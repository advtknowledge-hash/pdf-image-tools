<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PNG → JPG (Client-side)</title>
<link rel="icon" href="/favicon.svg" />
<link rel="stylesheet" href="/style.css">
<script src="/site.js" defer></script>
</head>
<body>
<header class="site-header">
  <div class="container bar">
    <div class="brand">
      <span class="logo"></span>
      <span>PDF & Image Tools</span>
 </div>
  <div class="container tool-tabs-wrap">
  <button class="tool-scroll tool-left" aria-label="Scroll tools left" title="Scroll left">‹</button>
  <nav class="tool-tabs" role="navigation" aria-label="Tools">
    <!-- use the same links you already have; examples: -->
    <a href="/merge"        data-tip="Combine multiple PDFs into one">Merge PDF</a>
    <a href="/delete-pages" data-tip="Remove pages you don’t need">Delete pages</a>
    <a href="/rotate-pages" data-tip="Rotate pages left/right">Rotate PDF</a>
    <a href="/reorder-pages"data-tip="Drag & reorder pages">Reorder PDF</a>
    <a href="/crop"         data-tip="Cut margins or select an area">Crop PDF</a>
    <a href="/compress"     data-tip="Reduce PDF file size">Compress PDF</a>
    <a href="/pdf-to-images"data-tip="Export pages as PNG/JPG">PDF → Images</a>
    <a href="/image-to-pdf" data-tip="Make a PDF from images">Image → PDF</a>
    <a href="/jpg-to-png"   data-tip="Convert JPG to PNG">JPG → PNG</a>
    <a href="/png-to-jpg"   data-tip="Convert PNG to JPG">PNG → JPG</a>
  </nav>
  <button class="tool-scroll tool-right" aria-label="Scroll tools right" title="Scroll right">›</button>
</div>

</header>
<div class="wrap">
  <div class="panel">
    <div class="row" style="justify-content:space-between">
      <div class="row">
        <label class="btn primary" for="file">Add PNGs</label>
        <input id="file" type="file" accept="image/png" multiple>
        <span id="meta" class="muted">0 images</span>
      </div>
      <div class="row">
        <button class="btn" id="btnClear">Clear</button>
        <button class="btn primary" id="btnExport" disabled>Download ZIP</button>
        <button class="btn" id="btnCancel" style="display:none">Cancel</button>
      </div>
    </div>

    <div class="opt">
      <label class="muted">JPEG quality</label>
      <input id="quality" type="range" min="0.5" max="1" step="0.01" value="0.92">
      <span id="qv" class="muted">0.92</span>
      <span class="muted">Transparent BG</span>
      <input id="bg" type="color" value="#ffffff" title="Background color for transparent PNGs">
    </div>

    <div class="drop" id="drop">Drag & drop PNG files here</div>

    <div class="progress" id="progressWrap" style="display:none">
      <progress id="prog" max="100" value="0"></progress>
      <span id="progLabel" class="muted">0%</span>
      <span id="progCount" class="muted"></span>
    </div>

    <div id="grid" class="grid"></div>
    <div class="muted" style="margin-top:8px">Everything runs in your browser. We’ll package the JPGs into a ZIP file.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
const $=s=>document.querySelector(s);
const fileEl=$('#file'), metaEl=$('#meta'), gridEl=$('#grid'), btnClear=$('#btnClear'), btnExport=$('#btnExport'), btnCancel=$('#btnCancel'), dropEl=$('#drop');
const progressWrap=$('#progressWrap'), prog=$('#prog'), progLabel=$('#progLabel'), progCount=$('#progCount');
const qualityEl=$('#quality'), qv=$('#qv'), bgEl=$('#bg');

let files = []; // File[]
let cancelFlag=false;

function updateMeta(){ metaEl.textContent = `${files.length} image${files.length!==1?'s':''}`; btnExport.disabled = files.length===0; }
function addFiles(list){
  for(const f of list){
    if(f && f.type === 'image/png'){ files.push(f); }
  }
  renderGrid(); updateMeta();
}
function renderGrid(){
  gridEl.innerHTML='';
  for(const f of files){
    const card=document.createElement('div'); card.className='card';
    const t=document.createElement('div'); t.className='thumb';
    const img=document.createElement('img'); img.alt=f.name; t.appendChild(img);
    const name=document.createElement('div'); name.className='name'; name.textContent=f.name;
    card.append(t,name); gridEl.appendChild(card);
    const reader=new FileReader();
    reader.onload = e=>{ img.src=e.target.result; };
    reader.readAsDataURL(f);
  }
}
function setProgress(done,total){
  if(total<=0){ progressWrap.style.display='none'; return; }
  progressWrap.style.display='flex';
  const pct=Math.round((done/total)*100);
  prog.value=pct; progLabel.textContent=pct+'%';
  progCount.textContent=`${done} / ${total}`;
}
function downloadBlob(blob, filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=filename; a.style.display='none';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 1500);
}
function hexToRGBA(hex){
  const m = hex.match(/^#([0-9a-f]{6})$/i);
  if(!m) return [255,255,255,255];
  const n = parseInt(m[1],16);
  return [(n>>16)&255, (n>>8)&255, n&255, 255];
}

qualityEl.addEventListener('input', ()=>{ qv.textContent=qualityEl.value; });

fileEl.addEventListener('change',e=>{ addFiles(e.target.files||[]); fileEl.value=''; });
dropEl.addEventListener('dragover',e=>{ e.preventDefault(); dropEl.style.opacity=.85; });
dropEl.addEventListener('dragleave',()=>{ dropEl.style.opacity=1; });
dropEl.addEventListener('drop',e=>{ e.preventDefault(); dropEl.style.opacity=1; addFiles(e.dataTransfer.files||[]); });

btnClear.addEventListener('click',()=>{ files=[]; renderGrid(); updateMeta(); });
btnCancel.addEventListener('click',()=>{ cancelFlag=true; });

btnExport.addEventListener('click', async ()=>{
  if(files.length===0) return;
  const quality = parseFloat(qualityEl.value || '0.92');
  const [r,g,b,a] = hexToRGBA(bgEl.value || '#ffffff');

  cancelFlag=false; btnCancel.style.display='inline-block'; btnExport.disabled=true;

  try{
    const zip=new JSZip();
    let done=0; setProgress(0,files.length);

    for(const f of files){
      if(cancelFlag) throw new Error('Cancelled');

      const dataUrl=await new Promise((res,rej)=>{
        const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=URL.createObjectURL(f);
      }).then(img=>{
        const canvas=document.createElement('canvas'); canvas.width=img.naturalWidth; canvas.height=img.naturalHeight;
        const ctx=canvas.getContext('2d');

        // Fill background for transparent PNGs
        ctx.fillStyle=`rgba(${r},${g},${b},${a/255})`;
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img,0,0);

        URL.revokeObjectURL(img.src);
        return canvas.toDataURL('image/jpeg', quality);
      });

      const base=(f.name.replace(/\.[^.]+$/,'')||'image')+'.jpg';
      zip.file(base, dataUrl.split(',')[1], {base64:true});
      done++; setProgress(done,files.length);
      await new Promise(r=>setTimeout(r,0));
    }

    const blob=await zip.generateAsync({type:'blob'});
    downloadBlob(blob,'png-to-jpg.zip');
  }catch(e){
    alert(e?.message || e);
  }finally{
    btnCancel.style.display='none'; btnExport.disabled=files.length===0; setProgress(0,0);
  }
});
</script>
</body>
</html>
