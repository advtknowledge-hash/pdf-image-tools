<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Image → PDF — Local & Private</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root{--bg:#0b0f14;--panel:#121821;--muted:#1b2230;--text:#e8eef6;--sub:#aab7c7;--accent:#6aa0ff}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#0b0f14,#0e1420);color:var(--text);font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial}
    header{padding:12px 16px;border-bottom:1px solid #1a2230;background:rgba(10,16,24,.8);backdrop-filter:blur(6px);position:sticky;top:0;z-index:10}
    header h1{margin:0;font-size:18px}
    .wrap{display:grid;grid-template-columns:360px 1fr;gap:12px;padding:12px}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}}
    .panel{background:var(--panel);border:1px solid #1a2230;border-radius:14px;padding:12px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .btn{appearance:none;border:1px solid #2a364a;background:#162233;color:var(--text);padding:9px 12px;border-radius:10px;cursor:pointer}
    .btn.primary{background:var(--accent);border-color:#508cff;color:#08111f;font-weight:600}
    .btn.ghost{background:#141c29}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    input[type="file"]{display:none}

    /* ✅ Aa j add karvanu chhe */
    #list {
      display: grid;
      gap: 8px;
      max-height: 80vh;   /* screen height no 80% */
      overflow-y: auto;   /* vertical scroll */
      padding-right: 6px; /* scroll bar space */
    }
    #list .item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid #223048;
      background: #0f1622;
      border-radius: 10px;
      padding: 6px 8px;
      font-size: 13px;
    }
  </style>
</head>
