<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Image → PDF — Local & Private</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root{--bg:#0b0f14;--panel:#121821;--muted:#1b2230;--text:#e8eef6;--sub:#aab7c7;--accent:#6aa0ff}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#0b0f14,#0e1420);color:var(--text);font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial}
    header{padding:12px 16px;border-bottom:1px solid #1a2230;background:#0f1622}
    header h1{margin:0;font-size:18px}

    .wrap{padding:14px;max-width:1100px;margin:auto}
    .panel{background:var(--panel);border:1px solid #1a2230;border-radius:14px;padding:16px;margin-bottom:14px}

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{appearance:none;border:1px solid #2a364a;background:#162233;color:var(--text);padding:9px 12px;border-radius:10px;cursor:pointer}
    .btn.primary{background:var(--accent);border-color:#508cff;color:#08111f;font-weight:600}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    input[type=file]{display:none}

    .drop{border:2px dashed #2a364a;border-radius:12px;padding:20px;text-align:center;background:#0f1622;margin-top:10px}
    .drop.drag{border-color:var(--accent)}

    /* ✅ Gallery grid */
    #gallery {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:12px;
      margin-top:14px;
    }
    .card{background:#0f1622;border:1px solid #223048;border-radius:10px;padding:6px;display:flex;flex-direction:column;align-items:center}
    .thumb{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:6px;background:#0b111b}
    .thumb img{max-width:100%;max-height:100%;display:block}
    .small{font-size:12px;color:#aab7c7;margin-top:4px;text-align:center}
    .handle{cursor:grab;margin-bottom:4px;color:#6aa0ff}
    .remove{margin-top:6px;font-size:12px;padding:4px 8px}

    /* ✅ Progress overlay */
    #progressOverlay {
      position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;
      color:white;font-size:18px;z-index:100;display:none;
    }
  </style>
</head>
<body>
  <header><h1>🖼 Image → PDF (Gallery view)</h1></header>
  <div class="wrap">
    <div class="panel">
      <div class="row">
        <label for="file" class="btn primary">Add images</label>
        <input id="file" type="file" accept="image/*" multiple />
        <button id="buildBtn" class="btn" disabled>Create PDF</button>
      </div>
      <div id="meta" class="small">No images</div>
      <div id="drop" class="drop">Drag & drop images here<br><span class="small">All processing happens locally</span></div>
    </div>

    <!-- ✅ Gallery -->
    <div id="gallery"></div>
  </div>

  <!-- Progress overlay -->
  <div id="progressOverlay">Loading…</div>

  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

  <script>
  const fileInput=document.getElementById('file');
  const drop=document.getElementById('drop');
  const gallery=document.getElementById('gallery');
  const meta=document.getElementById('meta');
  const buildBtn=document.getElementById('buildBtn');
  const overlay=document.getElementById('progressOverlay');
  let images=[];

  function setOverlay(txt,show=true){ overlay.textContent=txt; overlay.style.display=show?'flex':'none'; }
  function updateMeta(){ meta.textContent=images.length?`${images.length} images`:'No images'; buildBtn.disabled=images.length===0; }

  function renderGallery(){
    gallery.innerHTML='';
    images.forEach((img,idx)=>{
      const card=document.createElement('div'); card.className='card'; card.draggable=true; card.dataset.idx=idx;
      const handle=document.createElement('div'); handle.className='handle'; handle.textContent='↕ Drag';
      const thumb=document.createElement('div'); thumb.className='thumb';
      const imgtag=document.createElement('img'); imgtag.src=URL.createObjectURL(img.blob);
      imgtag.onload=()=>URL.revokeObjectURL(imgtag.src);
      thumb.appendChild(imgtag);
      const small=document.createElement('div'); small.className='small'; small.textContent=img.name;
      const remove=document.createElement('button'); remove.className='btn ghost remove'; remove.textContent='Remove';
      remove.onclick=()=>{ images.splice(idx,1); renderGallery(); updateMeta(); };
      card.append(handle,thumb,small,remove);
      gallery.appendChild(card);
    });
  }

  async function addFiles(fileList){
    const arr=Array.from(fileList).filter(f=>/^image\//i.test(f.type));
    if(!arr.length) return;
    setOverlay('Decoding images…');
    for(let i=0;i<arr.length;i++){
      const f=arr[i];
      try{
        let bitmap;
        if(f.type==='image/heic'||f.type==='image/heif'){ const out=await heic2any({blob:f,toType:'image/jpeg'}); bitmap=await createImageBitmap(out);}
        else bitmap=await createImageBitmap(f);
        const canvas=document.createElement('canvas'); canvas.width=bitmap.width; canvas.height=bitmap.height;
        canvas.getContext('2d').drawImage(bitmap,0,0);
        const blob=await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.92));
        images.push({name:f.name,w:bitmap.width,h:bitmap.height,blob});
      }catch(err){alert('Failed: '+err);}
      setOverlay(`Decoding ${i+1}/${arr.length}…`);
    }
    setOverlay('',false);
    renderGallery(); updateMeta();
  }

  fileInput.onchange=e=>addFiles(e.target.files);
  ['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');addFiles(e.dataTransfer.files);});

  buildBtn.onclick=async()=>{
    if(!images.length) return;
    setOverlay('Building PDF…');
    try{
      const doc=await PDFLib.PDFDocument.create();
      for(let i=0;i<images.length;i++){
        const img=images[i];
        const bytes=new Uint8Array(await img.blob.arrayBuffer());
        const embedded=await doc.embedJpg(bytes);
        const page=doc.addPage([embedded.width,embedded.height]);
        page.drawImage(embedded,{x:0,y:0,width:embedded.width,height:embedded.height});
        setOverlay(`Building page ${i+1}/${images.length}…`);
      }
      const pdfBytes=await doc.save();
      const blob=new Blob([pdfBytes],{type:'application/pdf'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='images-to-pdf.pdf'; a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1500);
    }catch(err){alert('Build failed: '+err);}
    setOverlay('',false);
  };
  </script>
</body>
</html>
